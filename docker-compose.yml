services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_DOMAIN: ${DOMAIN:-xneine.site}
    container_name: mailol-app
    restart: unless-stopped
    networks:
      - mailol-net
      - redis-net
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.mailol.rule=Host(`${TRAEFIK_HOST:-mailol.xneine.site}`)"
      - "traefik.http.routers.mailol.entrypoints=websecure"
      - "traefik.http.routers.mailol.tls=true"
      - "traefik.http.routers.mailol.tls.certresolver=letsencrypt"
      - "traefik.http.services.mailol.loadbalancer.server.port=3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - DOMAIN=${DOMAIN:-xneine.site}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-hash-value-for-mailol-production}
      - JWT_EXPIRY=${JWT_EXPIRY:-3600}
      - DEFAULT_QUOTA=${DEFAULT_QUOTA:-41943040}
      - MAX_FORWARD_RECIPIENTS=${MAX_FORWARD_RECIPIENTS:-10}

  mta:
    build:
      context: .
      dockerfile: Dockerfile.haraka
      args:
        DOMAIN: ${DOMAIN:-xneine.site}
    container_name: mailol-mta
    restart: unless-stopped
    ports:
      - "25:25"
    networks:
      - mailol-net
      - redis-net
    environment:
      - REDIS_URL=${REDIS_URL}
      - GMAIL_FORWARD_USER=${GMAIL_FORWARD_USER:-codingberes@gmail.com}
      - GMAIL_FORWARD_APP_PASSWORD=${GMAIL_FORWARD_APP_PASSWORD:-}

networks:
  mailol-net:
    name: mailol-net
    driver: bridge
  redis-net:
    name: redis-net
    external: true
  traefik-net:
    name: traefik-net
    external: true
